<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Knee-Friendly 3-Day Split</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface-alt: #f0efe9;
    --border: #e2e0d8;
    --border-strong: #c8c6bc;
    --text: #1a1917;
    --text-muted: #6b6962;
    --text-faint: #a8a69e;
    --accent: #2d6a4f;
    --accent-bg: #e8f5ee;
    --accent-text: #1b4332;
    --warn: #b5610a;
    --warn-bg: #fff3e0;
    --warn-text: #7c3d06;
    --danger: #9b1a1a;
    --success: #2d6a4f;
    --radius: 10px;
    --radius-lg: 16px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1d1b;
      --surface-alt: #252420;
      --border: #2e2d29;
      --border-strong: #3d3c38;
      --text: #f0efe9;
      --text-muted: #9b998f;
      --text-faint: #5e5c54;
      --accent: #52b788;
      --accent-bg: #0f2e1e;
      --accent-text: #95d5b2;
      --warn: #e07b2a;
      --warn-bg: #2a1800;
      --warn-text: #f4a460;
      --success: #52b788;
    }
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* Layout */
  .shell { max-width: 520px; margin: 0 auto; padding: 0 0 6rem; }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-inner { max-width: 520px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; }
  .topbar h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  .topbar .sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .knee-badge {
    font-size: 11px; font-weight: 500; padding: 4px 10px;
    background: var(--accent-bg); color: var(--accent-text);
    border-radius: 100px; border: 1px solid var(--accent);
    opacity: 0.8;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-btn {
    flex: 1; padding: 10px 0 12px; background: transparent; border: none;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--text-faint); font-size: 11px; font-family: var(--font); transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* Day selector */
  .day-selector { display: flex; gap: 8px; padding: 16px 16px 0; }
  .day-pill {
    flex: 1; padding: 10px 4px 8px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .day-pill .pill-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); }
  .day-pill .pill-name { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .day-pill.active { border-color: var(--accent); background: var(--accent-bg); }
  .day-pill.active .pill-label { color: var(--accent); }
  .day-pill.active .pill-name { color: var(--accent-text); }
  .day-pill.done .pill-label::after { content: ' ✓'; color: var(--success); }

  /* Session meta */
  .session-meta { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 16px 4px; }
  .chip {
    font-size: 12px; padding: 4px 10px; border-radius: 100px;
    background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-muted);
  }

  /* Timer */
  .timer-row {
    display: flex; align-items: center; gap: 10px;
    margin: 10px 16px 0; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .timer-display { font-family: var(--font-mono); font-size: 20px; font-weight: 500; min-width: 56px; }
  .timer-display.warn { color: var(--warn); }
  .timer-sub { font-size: 12px; color: var(--text-muted); flex: 1; }
  .timer-toggle {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border-strong);
    background: transparent; font-size: 13px; font-weight: 500; color: var(--text);
    cursor: pointer; font-family: var(--font);
  }
  .timer-toggle.running { border-color: var(--danger); color: var(--danger); }

  /* Exercise cards */
  .ex-list { padding: 10px 16px 0; display: flex; flex-direction: column; gap: 8px; }
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .ex-header { display: flex; align-items: center; padding: 12px 14px; cursor: pointer; gap: 10px; }
  .ex-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 600; }
  .ex-target { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .ex-progress { font-size: 12px; color: var(--text-faint); flex-shrink: 0; }
  .ex-chevron { font-size: 14px; color: var(--text-faint); transition: transform 0.2s; flex-shrink: 0; }
  .ex-chevron.open { transform: rotate(180deg); }

  .ex-note {
    margin: 0 14px; padding: 7px 10px; border-radius: 6px;
    background: var(--warn-bg); border: 1px solid rgba(181,97,10,0.2);
    font-size: 12px; color: var(--warn-text); display: none;
  }
  .ex-note.open { display: block; margin-bottom: 4px; }

  .ex-body { display: none; border-top: 1px solid var(--border); }
  .ex-body.open { display: block; }

  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th {
    padding: 7px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-faint); background: var(--surface-alt); text-align: left;
    font-weight: 500; border-bottom: 1px solid var(--border);
  }
  .sets-table th:first-child { width: 36px; text-align: center; }
  .sets-table th:last-child { width: 48px; text-align: center; }
  .sets-table td { border-bottom: 1px solid var(--border); }
  .sets-table tr:last-child td { border-bottom: none; }
  .set-num-cell { text-align: center; font-size: 12px; color: var(--text-faint); padding: 9px 4px; }
  .set-input {
    width: 100%; border: none; background: transparent; font-size: 14px; color: var(--text);
    padding: 9px 12px; outline: none; font-family: var(--font);
    border-right: 1px solid var(--border);
  }
  .set-input:focus { background: var(--accent-bg); }
  .set-input::placeholder { color: var(--text-faint); }
  .set-check-cell { text-align: center; padding: 0; }
  .chk-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--border-strong); background: transparent;
    cursor: pointer; font-size: 13px; color: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .chk-btn.done { background: var(--accent); border-color: var(--accent); color: #fff; }
  .add-set-btn {
    display: block; width: 100%; padding: 9px; font-size: 13px; color: var(--accent);
    background: transparent; border: none; cursor: pointer; font-family: var(--font);
    border-top: 1px solid var(--border);
  }
  .add-set-btn:hover { background: var(--accent-bg); }

  /* Progress section */
  .progress-section { padding: 16px 16px 0; }
  .prog-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .prog-track { height: 5px; background: var(--surface-alt); border-radius: 100px; overflow: hidden; margin-bottom: 14px; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.35s ease; }
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .finish-btn {
    display: block; width: 100%; margin-top: 12px; padding: 13px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 600;
    border: none; border-radius: var(--radius); cursor: pointer; font-family: var(--font);
    letter-spacing: -0.01em;
  }
  .finish-btn:hover { opacity: 0.9; }

  /* Plank timer */
  .plank-body { display: none; border-top: 1px solid var(--border); padding: 16px; }
  .plank-body.open { display: block; }
  .plank-ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .plank-ring { position: relative; width: 120px; height: 120px; }
  .plank-ring svg { transform: rotate(-90deg); }
  .plank-ring-bg { fill: none; stroke: var(--surface-alt); stroke-width: 8; }
  .plank-ring-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.5s linear; }
  .plank-ring-fill.done { stroke: var(--success); }
  .plank-time-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .plank-secs { font-family: var(--font-mono); font-size: 26px; font-weight: 500; line-height: 1; }
  .plank-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .plank-btns { display: flex; gap: 8px; }
  .plank-start { padding: 8px 24px; border-radius: var(--radius); border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font); }
  .plank-reset-btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: transparent; font-size: 14px; color: var(--text-muted); cursor: pointer; font-family: var(--font); }
  .plank-done-check { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: transparent; cursor: pointer; font-size: 16px; color: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .plank-done-check.done { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Reset day button */
  .reset-day-btn { display: block; width: 100%; margin-top: 8px; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text-muted); cursor: pointer; font-family: var(--font); }
  .reset-day-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Plan tab */
  .plan-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .plan-card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .plan-card-name { font-size: 15px; font-weight: 600; }
  .plan-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .plan-ex-row { display: flex; justify-content: space-between; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .plan-ex-row:last-child { border-bottom: none; }
  .plan-ex-name { color: var(--text); }
  .plan-ex-sets { color: var(--text-muted); }
  .knee-note {
    margin: 0 16px 16px; padding: 10px 12px; border-radius: var(--radius);
    background: var(--warn-bg); border: 1px solid rgba(181,97,10,0.25);
    font-size: 13px; color: var(--warn-text); line-height: 1.5;
  }

  /* Progress tab */
  .progress-page { padding: 16px; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-weight: 600; margin-bottom: 10px; }
  .pr-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
  .pr-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .pr-val { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; color: var(--accent); }
  .pr-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .history-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .history-name { font-size: 14px; font-weight: 500; }
  .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .done-tag { font-size: 11px; padding: 3px 10px; border-radius: 100px; background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-faint); font-size: 14px; }
  .empty-icon { font-size: 2rem; margin-bottom: 8px; }

  /* Glossary */
  .glossary-page { padding: 16px; }
  .glossary-search-wrap { position: relative; margin-bottom: 14px; }
  .glossary-search {
    width: 100%; padding: 10px 14px 10px 36px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    font-size: 14px; color: var(--text); font-family: var(--font); outline: none;
  }
  .glossary-search:focus { border-color: var(--accent); }
  .glossary-search::placeholder { color: var(--text-faint); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text-faint); pointer-events: none; }
  .glossary-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border);
    background: var(--surface); font-size: 12px; color: var(--text-muted);
    cursor: pointer; font-family: var(--font); transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }
  .glossary-list { display: flex; flex-direction: column; gap: 8px; }
  .gloss-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .gloss-header { display: flex; align-items: center; padding: 12px 14px; cursor: pointer; gap: 10px; }
  .gloss-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .gloss-info { flex: 1; min-width: 0; }
  .gloss-name { font-size: 14px; font-weight: 600; }
  .gloss-muscles { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .gloss-chevron { font-size: 14px; color: var(--text-faint); transition: transform 0.2s; }
  .gloss-chevron.open { transform: rotate(180deg); }
  .gloss-body { display: none; border-top: 1px solid var(--border); padding: 14px 16px; }
  .gloss-body.open { display: block; }
  .gloss-section { margin-bottom: 12px; }
  .gloss-section:last-child { margin-bottom: 0; }
  .gloss-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-weight: 600; margin-bottom: 6px; }
  .gloss-steps { display: flex; flex-direction: column; gap: 6px; }
  .gloss-step { display: flex; gap: 10px; font-size: 13px; line-height: 1.5; color: var(--text-muted); }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent-bg); color: var(--accent-text); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .gloss-tips { display: flex; flex-direction: column; gap: 5px; }
  .gloss-tip { font-size: 13px; color: var(--text-muted); padding-left: 14px; position: relative; line-height: 1.5; }
  .gloss-tip::before { content: '·'; position: absolute; left: 4px; color: var(--accent); }
  .knee-flag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 100px; background: var(--warn-bg); color: var(--warn-text); border: 1px solid rgba(181,97,10,0.2); margin-top: 8px; }
  .no-results { text-align: center; padding: 2rem; color: var(--text-faint); font-size: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <h1>Gym tracker</h1>
      <div class="sub">3-day split · 45 min sessions</div>
    </div>
    <span class="knee-badge">Knee-safe ✓</span>
  </div>
</div>

<div class="shell">
  <!-- TODAY -->
  <div id="tab-today">
    <div class="day-selector">
      <button class="day-pill active" onclick="selectDay(0)" id="pill-0">
        <div class="pill-label">Day 1</div>
        <div class="pill-name">Upper A</div>
      </button>
      <button class="day-pill" onclick="selectDay(1)" id="pill-1">
        <div class="pill-label">Day 2</div>
        <div class="pill-name">Lower</div>
      </button>
      <button class="day-pill" onclick="selectDay(2)" id="pill-2">
        <div class="pill-label">Day 3</div>
        <div class="pill-name">Upper B</div>
      </button>
    </div>
    <div id="session-content"></div>
  </div>

  <!-- PLAN -->
  <div id="tab-plan" style="display:none;">
    <div class="plan-list" id="plan-content"></div>
  </div>

  <!-- PROGRESS -->
  <div id="tab-progress" style="display:none;">
    <div class="progress-page">
      <div class="section-label">Lifetime totals</div>
      <div class="pr-grid">
        <div class="pr-tile"><div class="pr-val" id="p-sessions">0</div><div class="pr-lbl">Sessions</div></div>
        <div class="pr-tile"><div class="pr-val" id="p-sets">0</div><div class="pr-lbl">Total sets</div></div>
        <div class="pr-tile"><div class="pr-val" id="p-vol">0</div><div class="pr-lbl">Volume (kg)</div></div>
      </div>
      <div class="section-label">Session history</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- Bottom nav -->
<!-- Glossary -->
<div id="tab-glossary" style="display:none;">
  <div class="glossary-page">
    <div class="glossary-search-wrap">
      <span class="search-icon">🔍</span>
      <input class="glossary-search" type="text" placeholder="Search exercises…" oninput="filterGlossary(this.value)" id="gloss-search" />
    </div>
    <div class="glossary-filter" id="gloss-filters"></div>
    <div class="glossary-list" id="gloss-list"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('today')" id="nav-today">
    <span class="nav-icon">🏋️</span>Today
  </button>
  <button class="nav-btn" onclick="switchTab('plan')" id="nav-plan">
    <span class="nav-icon">📋</span>Plan
  </button>
  <button class="nav-btn" onclick="switchTab('progress')" id="nav-progress">
    <span class="nav-icon">📈</span>Progress
  </button>
  <button class="nav-btn" onclick="switchTab('glossary')" id="nav-glossary">
    <span class="nav-icon">📖</span>Guide
  </button>
</nav>

<script>
const ICONS = ['💪','🦵','🏋️','🔁','🧘'];
const days = [
  {
    name:'Upper A', focus:'Chest · Back · Shoulders', duration:'~43 min',
    exercises:[
      {name:'Seated cable row',      target:'4×10–12', muscles:'Back',      note:null, icon:'💪'},
      {name:'Incline dumbbell press',target:'3×10–12', muscles:'Chest',     note:null, icon:'🏋️'},
      {name:'Lat pulldown',          target:'3×10–12', muscles:'Back',      note:null, icon:'💪'},
      {name:'Dumbbell shoulder press',target:'3×10–12',muscles:'Shoulders', note:null, icon:'🏋️'},
      {name:'Face pulls',            target:'3×15',    muscles:'Rear delt', note:null, icon:'🔁'},
      {name:'Plank',                 target:'1×60s',   muscles:'Core · Full body', note:'Floor-based — zero knee load', icon:'🧘', isPlank:true},
    ]
  },
  {
    name:'Lower', focus:'Glutes · Hamstrings · Core', duration:'~41 min',
    exercises:[
      {name:'Hip thrust (barbell)',   target:'4×10–12', muscles:'Glutes',     note:'Keep feet flat — no knee stress', icon:'🦵'},
      {name:'Romanian deadlift',      target:'3×10',    muscles:'Hamstrings', note:'Soft knee bend only — hinge at hip', icon:'🦵'},
      {name:'Seated leg curl',        target:'3×12',    muscles:'Hamstrings', note:'Seated version — easier on knees than lying', icon:'🦵'},
      {name:'Standing calf raise',    target:'3×15',    muscles:'Calves',     note:null, icon:'🦵'},
      {name:'Dead bug (core)',        target:'3×10/side',muscles:'Core',      note:'Floor-based — zero knee load', icon:'🧘'},
      {name:'Plank',                  target:'1×60s',   muscles:'Core · Full body', note:'Floor-based — zero knee load', icon:'🧘', isPlank:true},
    ]
  },
  {
    name:'Upper B', focus:'Arms · Back · Chest', duration:'~44 min',
    exercises:[
      {name:'Assisted pull-up / pulldown', target:'4×8–10', muscles:'Back',     note:null, icon:'💪'},
      {name:'Dumbbell bench press',        target:'3×10–12', muscles:'Chest',    note:null, icon:'🏋️'},
      {name:'Seated cable bicep curl',     target:'3×12',    muscles:'Biceps',   note:null, icon:'💪'},
      {name:'Overhead tricep extension',   target:'3×12',    muscles:'Triceps',  note:null, icon:'💪'},
      {name:'Dumbbell lateral raise',      target:'3×15',    muscles:'Shoulders',note:null, icon:'🔁'},
      {name:'Plank',                       target:'1×60s',   muscles:'Core · Full body', note:'Floor-based — zero knee load', icon:'🧘', isPlank:true},
    ]
  }
];

let currentDay = 0;
const setData  = {};
const setDone  = {};
const openEx   = {};
const finishedDays = {};
const history  = [];
const plankDone = {}; // dayIdx -> bool
const plankTimers = {}; // dayIdx -> {secs, running, interval}

let timerSecs = 0, timerRunning = false, timerInterval = null;

// Init sets
days.forEach((d,di) => {
  setData[di] = {}; setDone[di] = {}; openEx[di] = {};
  plankDone[di] = false;
  plankTimers[di] = {secs:0, running:false, interval:null};
  d.exercises.forEach((ex,ei) => {
    if(ex.isPlank){ setData[di][ei]=[]; setDone[di][ei]=[]; openEx[di][ei]=ei===0; return; }
    const n = parseInt(ex.target);
    setData[di][ei] = Array.from({length:n}, ()=>({kg:'',reps:''}));
    setDone[di][ei] = Array(n).fill(false);
    openEx[di][ei] = ei===0;
  });
});

function selectDay(idx) {
  currentDay = idx;
  stopTimer();
  document.querySelectorAll('.day-pill').forEach((p,i)=>p.classList.toggle('active',i===idx));
  renderSession();
}

function switchTab(name) {
  ['today','plan','progress','glossary'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
    document.getElementById('nav-'+t).classList.toggle('active',t===name);
  });
  if(name==='plan') renderPlan();
  if(name==='progress') renderProgress();
  if(name==='glossary') { renderGlossaryFilters(); renderGlossaryList(); }
}

// --- SESSION ---
function renderSession() {
  const d = days[currentDay];
  const di = currentDay;
  let totalSets=0, doneSets=0, vol=0;
  d.exercises.forEach((ex,ei)=>{
    if(ex.isPlank){ totalSets++; if(plankDone[di]) doneSets++; return; }
    totalSets += setData[di][ei].length;
    setDone[di][ei].forEach((ok,si)=>{
      if(ok){ doneSets++; vol+=(parseFloat(setData[di][ei][si].kg)||0)*(parseInt(setData[di][ei][si].reps)||0); }
    });
  });
  const pct = totalSets?Math.round(doneSets/totalSets*100):0;

  let html = `
    <div class="session-meta">
      <span class="chip">⏱ ${d.duration}</span>
      <span class="chip">${d.focus}</span>
    </div>
    <div class="timer-row">
      <div class="timer-display${timerSecs>=2700?' warn':''}" id="timer-disp">${fmtTime(timerSecs)}</div>
      <div class="timer-sub">${timerSecs>=2700?'45 min reached':'Session timer'}</div>
      <button class="timer-toggle${timerRunning?' running':''}" onclick="toggleTimer()" id="timer-btn">${timerRunning?'Stop':'Start'}</button>
    </div>
    <div class="ex-list">
      ${d.exercises.map((ex,ei)=>renderExCard(di,ei,ex)).join('')}
    </div>
    <div class="progress-section">
      <div class="prog-header"><span>${doneSets} of ${totalSets} sets done</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="stats-grid">
        <div class="stat-tile"><div class="stat-val">${Math.round(vol)}</div><div class="stat-lbl">Volume (kg)</div></div>
        <div class="stat-tile"><div class="stat-val">${doneSets}</div><div class="stat-lbl">Sets done</div></div>
        <div class="stat-tile"><div class="stat-val">${d.exercises.length}</div><div class="stat-lbl">Exercises</div></div>
      </div>
      ${doneSets===totalSets&&totalSets>0&&!finishedDays[di]?
        `<button class="finish-btn" onclick="finishSession()">Complete session ✓</button>`:''}
      ${finishedDays[di]?`<div style="text-align:center;padding:14px;font-size:14px;color:var(--accent);font-weight:600;">Session saved ✓</div>
        <button class="reset-day-btn" onclick="resetDay(${di})">↺ Reset this day</button>`:''}
    </div>
    <div style="height:1rem;"></div>
  `;
  document.getElementById('session-content').innerHTML = html;
}

function renderExCard(di,ei,ex) {
  if(ex.isPlank) return renderPlankCard(di,ei,ex);
  const sets = setData[di][ei];
  const done = setDone[di][ei];
  const isOpen = openEx[di][ei];
  const doneCt = done.filter(Boolean).length;
  return `
    <div class="ex-card">
      <div class="ex-header" onclick="toggleEx(${di},${ei})">
        <div class="ex-icon">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">${ex.muscles} · ${ex.target}</div>
        </div>
        <div class="ex-progress">${doneCt}/${sets.length}</div>
        <div class="ex-chevron${isOpen?' open':''}">▾</div>
      </div>
      ${ex.note?`<div class="ex-note${isOpen?' open':''}">⚠️ ${ex.note}</div>`:''}
      <div class="ex-body${isOpen?' open':''}">
        <table class="sets-table">
          <thead><tr>
            <th>#</th><th>Weight (kg)</th><th>Reps</th><th>✓</th>
          </tr></thead>
          <tbody>
            ${sets.map((s,si)=>`
            <tr>
              <td class="set-num-cell">${si+1}</td>
              <td><input class="set-input" type="number" min="0" step="2.5" placeholder="—" value="${s.kg}" oninput="setVal(${di},${ei},${si},'kg',this.value)" /></td>
              <td><input class="set-input" type="number" min="0" step="1" placeholder="—" value="${s.reps}" oninput="setVal(${di},${ei},${si},'reps',this.value)" /></td>
              <td class="set-check-cell"><button class="chk-btn${done[si]?' done':''}" onclick="toggleDone(${di},${ei},${si})">✓</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <button class="add-set-btn" onclick="addSet(${di},${ei})">+ Add set</button>
      </div>
    </div>`;
}

function toggleEx(di,ei) {
  openEx[di][ei] = !openEx[di][ei];
  renderSession();
}

function setVal(di,ei,si,field,val) {
  setData[di][ei][si][field] = val;
}

function toggleDone(di,ei,si) {
  setDone[di][ei][si] = !setDone[di][ei][si];
  renderSession();
  // keep card open
  openEx[di][ei] = true;
}

function addSet(di,ei) {
  setData[di][ei].push({kg:'',reps:''});
  setDone[di][ei].push(false);
  openEx[di][ei] = true;
  renderSession();
}

function renderPlankCard(di,ei,ex) {
  const isOpen = openEx[di][ei];
  const pt = plankTimers[di];
  const isDone = plankDone[di];
  const TOTAL = 60;
  const remaining = Math.max(0, TOTAL - pt.secs);
  const circumference = 2 * Math.PI * 52;
  const offset = circumference * (remaining / TOTAL);
  return `
    <div class="ex-card">
      <div class="ex-header" onclick="toggleEx(${di},${ei})">
        <div class="ex-icon">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">${ex.muscles} · 1 × 60 sec</div>
        </div>
        <div class="ex-progress" style="color:${isDone?'var(--accent)':'var(--text-faint)'};">${isDone?'✓ done':'0/1'}</div>
        <div class="ex-chevron${isOpen?' open':''}">▾</div>
      </div>
      ${ex.note?`<div class="ex-note${isOpen?' open':''}">⚠️ ${ex.note}</div>`:''}
      <div class="plank-body${isOpen?' open':''}">
        <div class="plank-ring-wrap">
          <div class="plank-ring">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle class="plank-ring-bg" cx="60" cy="60" r="52"/>
              <circle class="plank-ring-fill${isDone?' done':''}" cx="60" cy="60" r="52"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}"/>
            </svg>
            <div class="plank-time-label">
              <div class="plank-secs">${remaining}</div>
              <div class="plank-sublabel">seconds</div>
            </div>
          </div>
          <div class="plank-btns">
            ${!isDone?`
            <button class="plank-start" onclick="togglePlankTimer(${di})">
              ${pt.running?'Pause':'Start'}
            </button>
            <button class="plank-reset-btn" onclick="resetPlankTimer(${di})">Reset</button>
            `:''}
            <button class="plank-done-check${isDone?' done':''}" onclick="togglePlankDone(${di})" title="${isDone?'Mark undone':'Mark done'}">✓</button>
          </div>
          ${isDone?`<div style="font-size:13px;color:var(--accent);font-weight:500;">1 min plank complete 💪</div>`:''}
          <a href="https://www.youtube.com/watch?v=ASdvN_XEl_c&t=18s" target="_blank" style="font-size:13px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:5px;margin-top:4px;">▶ Watch plank variations</a>
        </div>
      </div>
    </div>`;
}

function togglePlankTimer(di) {
  const pt = plankTimers[di];
  if(pt.running){
    clearInterval(pt.interval); pt.running=false;
  } else {
    if(pt.secs>=60){ pt.secs=0; }
    pt.running=true;
    pt.interval = setInterval(()=>{
      pt.secs++;
      if(pt.secs>=60){
        clearInterval(pt.interval); pt.running=false;
        plankDone[di]=true;
      }
      renderSession();
      openEx[di][days[di].exercises.findIndex(e=>e.isPlank)]=true;
    },1000);
  }
  renderSession();
  openEx[di][days[di].exercises.findIndex(e=>e.isPlank)]=true;
}

function resetPlankTimer(di) {
  const pt = plankTimers[di];
  clearInterval(pt.interval); pt.running=false; pt.secs=0;
  plankDone[di]=false;
  renderSession();
  openEx[di][days[di].exercises.findIndex(e=>e.isPlank)]=true;
}

function togglePlankDone(di) {
  const pt = plankTimers[di];
  clearInterval(pt.interval); pt.running=false;
  plankDone[di]=!plankDone[di];
  if(plankDone[di]) pt.secs=60; else pt.secs=0;
  renderSession();
  openEx[di][days[di].exercises.findIndex(e=>e.isPlank)]=true;
}

function resetDay(di) {
  if(!confirm('Reset this session? Your log entry will stay in history.')) return;
  const d = days[di];
  d.exercises.forEach((ex,ei)=>{
    if(ex.isPlank){ return; }
    const n = parseInt(ex.target);
    setData[di][ei] = Array.from({length:n},()=>({kg:'',reps:''}));
    setDone[di][ei] = Array(n).fill(false);
    openEx[di][ei] = ei===0;
  });
  plankDone[di]=false;
  plankTimers[di]={secs:0,running:false,interval:null};
  finishedDays[di]=false;
  document.getElementById('pill-'+di).classList.remove('done');
  timerSecs=0; stopTimer();
  renderSession();
}

function finishSession() {
  const di = currentDay;
  const d = days[di];
  let vol=0, sets=0;
  d.exercises.forEach((ex,ei)=>{
    setDone[di][ei].forEach((ok,si)=>{
      if(ok){ vol+=(parseFloat(setData[di][ei][si].kg)||0)*(parseInt(setData[di][ei][si].reps)||0); sets++; }
    });
  });
  history.unshift({name:d.name, focus:d.focus, sets, vol:Math.round(vol), date:new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})});
  finishedDays[di] = true;
  document.getElementById('pill-'+di).classList.add('done');
  renderSession();
  saveToStorage();
}

// --- TIMER ---
function toggleTimer() {
  if(timerRunning) stopTimer();
  else startTimer();
}
function startTimer() {
  timerRunning = true;
  timerInterval = setInterval(()=>{
    timerSecs++;
    const el = document.getElementById('timer-disp');
    const btn = document.getElementById('timer-btn');
    if(el) { el.textContent = fmtTime(timerSecs); el.className='timer-display'+(timerSecs>=2700?' warn':''); }
    if(btn) btn.textContent='Stop';
  },1000);
  const btn=document.getElementById('timer-btn');
  if(btn){btn.textContent='Stop';btn.className='timer-toggle running';}
}
function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  const btn=document.getElementById('timer-btn');
  if(btn){btn.textContent='Start';btn.className='timer-toggle';}
}
function fmtTime(s){ return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0'); }

// --- PLAN ---
function renderPlan() {
  const pa = document.getElementById('plan-content');
  pa.innerHTML = days.map(d=>`
    <div class="plan-card">
      <div class="plan-card-header">
        <div>
          <div class="plan-card-name">${d.name}</div>
          <div class="plan-card-meta">${d.focus} · ${d.duration}</div>
        </div>
      </div>
      ${d.exercises.map(ex=>`
        <div class="plan-ex-row">
          <span class="plan-ex-name">${ex.icon} ${ex.name}</span>
          <span class="plan-ex-sets">${ex.target}</span>
        </div>`).join('')}
    </div>`).join('')+`
    <div class="knee-note">
      <strong>Knee arthritis adaptations:</strong> No deep squats, lunges, or leg press. All leg work uses a pain-free range of motion. Romanian deadlifts and hip thrusts replace quad-dominant movements.
    </div>`;
}

// --- PROGRESS ---
function renderProgress() {
  const totalSets = history.reduce((a,h)=>a+h.sets,0);
  const totalVol  = history.reduce((a,h)=>a+h.vol,0);
  document.getElementById('p-sessions').textContent = history.length;
  document.getElementById('p-sets').textContent = totalSets;
  document.getElementById('p-vol').textContent = totalVol;
  const hl = document.getElementById('history-list');
  if(!history.length){
    hl.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>Complete a session to see it here.</div>`;
    return;
  }
  hl.innerHTML=`<div class="history-list">${history.map(h=>`
    <div class="history-item">
      <div>
        <div class="history-name">${h.name}</div>
        <div class="history-meta">${h.date} · ${h.sets} sets · ${h.vol} kg</div>
      </div>
      <span class="done-tag">Done ✓</span>
    </div>`).join('')}</div>`;
}

// --- STORAGE ---
function saveToStorage() {
  try {
    localStorage.setItem('gym_history', JSON.stringify(history));
    localStorage.setItem('gym_finished', JSON.stringify(finishedDays));
  } catch(e){}
}
function loadFromStorage() {
  try {
    const h = localStorage.getItem('gym_history');
    const f = localStorage.getItem('gym_finished');
    if(h) history.push(...JSON.parse(h));
    if(f) Object.assign(finishedDays, JSON.parse(f));
    Object.keys(finishedDays).forEach(di=>{
      const p = document.getElementById('pill-'+di);
      if(p) p.classList.add('done');
    });
  } catch(e){}
}

const allCategories = [...new Set(glossary.map(g=>g.category))];
let activeCategory = 'All';
let searchQuery = '';
let openGloss = {};

function renderGlossaryFilters() {
  const el = document.getElementById('gloss-filters');
  el.innerHTML = ['All',...allCategories].map(c=>
    `<button class="filter-btn${activeCategory===c?' active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderGlossaryFilters();
  renderGlossaryList();
}

function filterGlossary(q) {
  searchQuery = q.toLowerCase();
  renderGlossaryList();
}

function renderGlossaryList() {
  const el = document.getElementById('gloss-list');
  const filtered = glossary.filter(g => {
    const matchCat = activeCategory==='All' || g.category===activeCategory;
    const matchQ = !searchQuery || g.name.toLowerCase().includes(searchQuery) || g.muscles.toLowerCase().includes(searchQuery);
    return matchCat && matchQ;
  });
  if(!filtered.length) {
    el.innerHTML = '<div class="no-results">No exercises found.</div>';
    return;
  }
  el.innerHTML = filtered.map((g,i)=>{
    const idx = glossary.indexOf(g);
    const isOpen = openGloss[idx];
    return `
    <div class="gloss-card">
      <div class="gloss-header" onclick="toggleGloss(${idx})">
        <div class="gloss-icon">${g.icon}</div>
        <div class="gloss-info">
          <div class="gloss-name">${g.name}</div>
          <div class="gloss-muscles">${g.muscles}</div>
        </div>
        <div class="gloss-chevron${isOpen?' open':''}">▾</div>
      </div>
      <div class="gloss-body${isOpen?' open':''}">
        <div class="gloss-section">
          <div class="gloss-section-title">How to perform</div>
          <div class="gloss-steps">
            ${g.steps.map((s,si)=>`<div class="gloss-step"><div class="step-num">${si+1}</div><div>${s}</div></div>`).join('')}
          </div>
        </div>
        <div class="gloss-section">
          <div class="gloss-section-title">Tips</div>
          <div class="gloss-tips">
            ${g.tips.map(t=>`<div class="gloss-tip">${t}</div>`).join('')}
          </div>
        </div>
        ${g.kneeNote?`<div class="knee-flag">🦵 ${g.kneeNote}</div>`:''}
        ${g.videoUrl?`<a href="${g.videoUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:13px;color:var(--accent);text-decoration:none;">▶ Watch video guide</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleGloss(idx) {
  openGloss[idx] = !openGloss[idx];
  renderGlossaryList();
}

// Boot
loadFromStorage();
renderSession();
</script>
